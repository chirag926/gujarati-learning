<!DOCTYPE html>
<html>
<head>
  <title>Gujarati Practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px;
    }
    button {
      font-size: 20px;
      padding: 15px 25px;
      margin-top: 20px;
    }
    .card {
      margin-top: 30px;
      font-size: 24px;
    }
  </style>
</head>
<body>

<h1>Gujarati Speaking Drill</h1>

<button onclick="generate()">Generate Prompt</button>

<div class="card" id="output"></div>

<script>
const verbs = ["to eat", "to go", "to see", "to do", "to speak", "to run", "to laugh", "to come"];
const persons = [
  "I (1st singular)",
  "You informal (2nd singular)",
  "You formal (2nd plural)",
  "You all (2nd plural)",
  "He/She (3rd singular)",
  "We includsive (1st plural)",
  "We exclusive (1st plural)",
  "They (3rd plural)"
];
const tenses = ["Present", "Past", "Future"];

function random(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generate() {
  const verb = random(verbs);
  const person = random(persons);
  const tense = random(tenses);

  document.getElementById("output").innerHTML =
    `Say: <br><br>
     <b>${person}</b><br>
     <b>${tense} tense</b><br>
     Verb: <b>${verb}</b>`;
}
</script>

</body>
</html>
