<!DOCTYPE html>
<html>
<head>
  <title>Gujarati Practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px 20px;
      background-color: #f0f4ff;
      color: #1a1a2e;
      box-sizing: border-box;
    }
    h1 {
      color: #4a3f8f;
    }
    button {
      font-size: 20px;
      padding: 15px 25px;
      margin-top: 20px;
      background-color: #4a3f8f;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      max-width: 400px;
    }
    button:hover {
      background-color: #6b5ebd;
    }
    .card {
      margin-top: 30px;
      font-size: 24px;
      background-color: #ffffff;
      border: 2px solid #c5b8f5;
      border-radius: 12px;
      padding: 30px 20px;
      display: block;
      width: 100%;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      box-sizing: border-box;
      box-shadow: 0 4px 12px rgba(74, 63, 143, 0.15);
    }
    @media (max-width: 480px) {
      h1 {
        font-size: 22px;
      }
      .card {
        font-size: 20px;
        padding: 20px 15px;
      }
      button {
        font-size: 18px;
      }
    }
    b {
      color: #4a3f8f;
    }
    .secondary-btn {
      background-color: #ffffff;
      color: #4a3f8f;
      border: 2px solid #4a3f8f;
      margin-top: 12px;
    }
    .secondary-btn:hover {
      background-color: #ede9ff;
    }
    .pronoun-table {
      margin: 20px auto 0;
      width: 100%;
      max-width: 400px;
      border-collapse: collapse;
      background-color: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 12px rgba(74, 63, 143, 0.15);
      border: 2px solid #c5b8f5;
    }
    .screen {
      display: none;
    }
    .screen.active {
      display: block;
    }
    .pronoun-table th {
      background-color: #4a3f8f;
      color: #ffffff;
      padding: 12px 14px;
      font-size: 18px;
    }
    .pronoun-table td {
      padding: 12px 14px;
      font-size: 20px;
      border-top: 1px solid #e0d9ff;
      text-align: left;
    }
    .pronoun-table tr:nth-child(even) td {
      background-color: #f7f4ff;
    }
  </style>
</head>
<body>

<div id="mainScreen" class="screen active">
  <h1>Gujarati Speaking Drill</h1>
  <button onclick="generate()">Generate Prompt</button>
  <div class="card" id="output"></div>
  <button id="showPronounsBtn" class="secondary-btn" onclick="showScreen('pronounScreen')" style="display:none;">Show Pronouns Table</button>
</div>

<div id="pronounScreen" class="screen">
  <h1>Pronouns</h1>
  <table class="pronoun-table">
    <thead>
      <tr>
        <th>English</th>
        <th>Romanized Gujarati</th>
      </tr>
    </thead>
    <tbody>
      <tr><td>I</td><td>Hũ</td></tr>
      <tr><td>You (informal)</td><td>Tũ</td></tr>
      <tr><td>You (formal)</td><td>Tame</td></tr>
      <tr><td>You all</td><td>Tame / Tame badhā</td></tr>
      <tr><td>He / She</td><td>E</td></tr>
      <tr><td>We (exclusive)</td><td>Ame</td></tr>
      <tr><td>We (inclusive)</td><td>Āpaḍe</td></tr>
      <tr><td>They</td><td>E badhā</td></tr>
    </tbody>
  </table>
  <button class="secondary-btn" onclick="showScreen('mainScreen')">← Back</button>
</div>

<script>
const verbs = ["to eat", "to go", "to see", "to do", "to speak", "to run",
               "to laugh", "to come", "to drink", "to write", "to sleep",
               "to read", "to play", "to cry", "to listen", "to wake up",
               "to bind or tie", "to taste", "to throw", "to wash", "to hit",
               "to learn", "to sell", "to buy", "to touch", "to give", "to take",
               "to think", "to dance"];

const persons = [
  "I",
  "You (informal)",
  "You (formal)",
  "You all",
  "He",
  "She",
  "We (inclusive)",
  "We (exclusive)",
  "They"
];

const tenses = ["Present", "Past", "Future"];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function random(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generate() {
  const verb = random(verbs);
  const person = random(persons);
  const tense = random(tenses);

  document.getElementById("output").innerHTML =
    `Say in Gujarati:<br><br>
    Pronoun: <b>${person}</b><br><br>
    Tense: <b>${tense}</b><br><br>
    Verb: <b>${verb}</b>`;
  document.getElementById("showPronounsBtn").style.display = "";
}
</script>

</body>
</html>
