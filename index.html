<!DOCTYPE html>
<html>
<head>
  <title>Gujarati Practice</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 40px 20px;
      background-color: #f0f4ff;
      color: #1a1a2e;
      box-sizing: border-box;
    }
    h1 {
      color: #4a3f8f;
    }
    button {
      font-size: 20px;
      padding: 15px 25px;
      margin-top: 20px;
      background-color: #4a3f8f;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
      max-width: 400px;
    }
    button:hover {
      background-color: #6b5ebd;
    }
    .card {
      margin-top: 30px;
      font-size: 24px;
      background-color: #ffffff;
      border: 2px solid #c5b8f5;
      border-radius: 12px;
      padding: 30px 20px;
      display: block;
      width: 100%;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      box-sizing: border-box;
      box-shadow: 0 4px 12px rgba(74, 63, 143, 0.15);
    }
    @media (max-width: 480px) {
      h1 {
        font-size: 22px;
      }
      .card {
        font-size: 20px;
        padding: 20px 15px;
      }
      button {
        font-size: 18px;
      }
    }
    b {
      color: #4a3f8f;
    }
  </style>
</head>
<body>

<h1>Gujarati Speaking Drill</h1>

<button onclick="generate()">Generate Prompt</button>

<div class="card" id="output"></div>

<script>
const verbs = ["to eat", "to go", "to see", "to do", "to speak", "to run",
               "to laugh", "to come", "to drink", "to write", "to sleep",
               "to read", "to play", "to cry", "to listen", "to wake up",
               "to bind or tie", "to taste", "to throw", "to wash", "to hit",
               "to learn", "to sell", "to buy", "to touch", "to give", "to take",
               "to think", "to dance"];

const persons = [
  "I",
  "You (informal)",
  "You (formal)",
  "You all",
  "He",
  "She",
  "We",
  "They"
];

const tenses = ["Present", "Past", "Future"];

function random(arr) {
  return arr[Math.floor(Math.random() * arr.length)];
}

function generate() {
  const verb = random(verbs);
  const person = random(persons);
  const tense = random(tenses);

  document.getElementById("output").innerHTML =
    `Say in Gujarati:<br><br>
    Pronoun: <b>${person}</b><br><br>
    Tense: <b>${tense}</b><br><br>
    Verb: <b>${verb}</b>`;
}
</script>

</body>
</html>
